<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 0; }
        .nav { display: flex; background: #1e1e1e; border-bottom: 2px solid #00c853; position: sticky; top: 0; z-index: 100; }
        .nav button { flex: 1; padding: 15px; background: none; border: none; color: white; font-weight: bold; cursor: pointer; }
        .nav button.active { border-bottom: 4px solid #00c853; color: #00c853; }
        
        .container { padding: 15px; margin-bottom: 80px; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        .cat-item { display: flex; justify-content: space-between; background: #1e1e1e; padding: 10px; margin-bottom: 5px; border-radius: 5px; align-items: center; }
        
        .card { background: #1e1e1e; padding: 15px; margin-top: 10px; border-radius: 8px; border-left: 5px solid #00c853; }
        .header-lista { background: #121212; padding: 10px 0; }
        .item-lista { background: #252525; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        
        .btn-add { background: #00c853; color: black; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 8px; margin-top: 10px; }
        .viva-bs { color: #00c853; font-weight: bold; font-size: 1.2em; }
        .oculto { display: none; }
        .delete { color: #ff5252; background: none; border: none; font-weight: bold; }
        .tipo-badge { font-size: 10px; background: #444; padding: 2px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="nav">
    <button id="btn-tab-listas" class="active" onclick="showTab('listas')">LISTAS</button>
    <button id="btn-tab-catalogo" onclick="showTab('catalogo')">CATÁLOGO</button>
</div>

<div id="seccion-catalogo" class="container oculto">
    <h3>Gestionar Productos</h3>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="nuevo-prod-nombre" placeholder="Nombre (Ej: Tomate)">
        <button onclick="agregarAlCatalogo()" style="background:#00c853; border:none; padding:10px 15px; border-radius:5px; font-weight:bold;">+</button>
    </div>
    <div id="lista-catalogo" style="margin-top:20px;"></div>
</div>

<div id="seccion-listas" class="container">
    <div id="vista-menu-listas">
        <button class="btn-add" onclick="nuevaLista()">+ NUEVA LISTA</button>
        <div id="contenedor-todas-listas"></div>
    </div>

    <div id="vista-detalle-lista" class="oculto">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="irAMenuListas()" style="color:#00c853; background:none; border:none; padding:10px 0; font-weight:bold;">← VOLVER</button>
            <button class="delete" onclick="eliminarListaActual()">Eliminar Lista</button>
        </div>
        <div class="header-lista">
            <input type="text" id="edit-titulo" oninput="guardarActual()">
            <input type="date" id="edit-fecha" oninput="guardarActual()" style="margin: 5px 0;">
            <div style="background:#1e1e1e; padding:10px; border-radius:5px; margin-top:5px;">
                Tasa Bs/$: <input type="number" id="edit-tasa" style="width:100px" oninput="guardarActual()">
                <div style="margin-top:10px">Total: <span id="resUSD">0</span>$ | <span id="resBS" class="viva-bs">0</span> Bs</div>
            </div>
        </div>
        <div id="filas-articulos"></div>
        <button class="btn-add" onclick="agregarFilaVacia()">+ AGREGAR ARTÍCULO</button>
    </div>
</div>

<datalist id="datalist-prods"></datalist>

<script>
    let db = JSON.parse(localStorage.getItem('app_data')) || { catalogo: [], listas: [] };
    let idActual = -1;

    function save() { localStorage.setItem('app_data', JSON.stringify(db)); actualizarDatalist(); }

    function showTab(tab) {
        document.getElementById('seccion-listas').classList.toggle('oculto', tab !== 'listas');
        document.getElementById('seccion-catalogo').classList.toggle('oculto', tab !== 'catalogo');
        document.getElementById('btn-tab-listas').classList.toggle('active', tab === 'listas');
        document.getElementById('btn-tab-catalogo').classList.toggle('active', tab === 'catalogo');
        if(tab === 'catalogo') renderCatalogo();
        if(tab === 'listas') renderMenuListas();
    }

    function agregarAlCatalogo() {
        const input = document.getElementById('nuevo-prod-nombre');
        if(input.value.trim()) {
            db.catalogo.push(input.value.trim());
            input.value = '';
            save();
            renderCatalogo();
        }
    }

    function renderCatalogo() {
        const cont = document.getElementById('lista-catalogo');
        cont.innerHTML = '';
        db.catalogo.sort().forEach((p, i) => {
            cont.innerHTML += `<div class="cat-item"><span>${p}</span><button class="delete" onclick="borrarDelCat(${i})">Borrar</button></div>`;
        });
    }

    function borrarDelCat(i) { if(confirm('¿Quitar del catálogo?')) { db.catalogo.splice(i, 1); save(); renderCatalogo(); } }

    function actualizarDatalist() {
        const dl = document.getElementById('datalist-prods');
        dl.innerHTML = db.catalogo.map(p => `<option value="${p}">`).join('');
    }

    function nuevaLista() {
        const lista = { titulo: "Compra Nueva", fecha: new Date().toISOString().split('T')[0], tasa: 45, items: [] };
        db.listas.push(lista);
        idActual = db.listas.length - 1;
        abrirLista(idActual);
    }

    function renderMenuListas() {
        const cont = document.getElementById('contenedor-todas-listas');
        cont.innerHTML = '';
        db.listas.forEach((l, i) => {
            cont.innerHTML += `
                <div class="card" onclick="abrirLista(${i})">
                    <strong>${l.titulo}</strong><br><small>${l.fecha}</small>
                </div>`;
        });
    }

    function abrirLista(i) {
        idActual = i;
        const l = db.listas[i];
        document.getElementById('edit-titulo').value = l.titulo;
        document.getElementById('edit-fecha').value = l.fecha;
        document.getElementById('edit-tasa').value = l.tasa;
        document.getElementById('vista-menu-listas').classList.add('oculto');
        document.getElementById('vista-detalle-lista').classList.remove('oculto');
        renderFilas();
    }

    function agregarFilaVacia() { 
        db.listas[idActual].items.push({n:'', p:0, c:1, tipo: 'und'}); 
        renderFilas(); 
    }

    function renderFilas() {
        const cont = document.getElementById('filas-articulos');
        cont.innerHTML = '';
        db.listas[idActual].items.forEach((it, idx) => {
            cont.innerHTML += `
                <div class="item-lista">
                    <div style="display:flex; gap:5px; margin-bottom:5px;">
                        <input type="text" value="${it.n}" list="datalist-prods" oninput="actualizarItem(${idx}, 'n', this.value)" placeholder="Producto" style="flex:2">
                        <select onchange="actualizarItem(${idx}, 'tipo', this.value)" style="flex:1">
                            <option value="und" ${it.tipo === 'und' ? 'selected' : ''}>Unidad</option>
                            <option value="kg" ${it.tipo === 'kg' ? 'selected' : ''}>Kilo</option>
                        </select>
                        <button class="delete" onclick="borrarFila(${idx})">×</button>
                    </div>
                    <div class="grid">
                        <input type="number" value="${it.p}" oninput="actualizarItem(${idx}, 'p', this.value)" placeholder="${it.tipo === 'und' ? 'Precio $' : 'Precio x Kg $'}">
                        <input type="number" value="${it.c}" oninput="actualizarItem(${idx}, 'c', this.value)" placeholder="${it.tipo === 'und' ? 'Cant' : 'Peso (Kg)'}" step="0.001">
                    </div>
                </div>`;
        });
        calcTotal();
    }

    function borrarFila(idx) { db.listas[idActual].items.splice(idx, 1); guardarActual(); renderFilas(); }

    function actualizarItem(idx, campo, valor) {
        db.listas[idActual].items[idx][campo] = (campo === 'n' || campo === 'tipo') ? valor : parseFloat(valor);
        guardarActual();
        calcTotal();
    }

    function guardarActual() {
        db.listas[idActual].titulo = document.getElementById('edit-titulo').value;
        db.listas[idActual].fecha = document.getElementById('edit-fecha').value;
        db.listas[idActual].tasa = parseFloat(document.getElementById('edit-tasa').value) || 0;
        save();
    }

    function calcTotal() {
        let tUSD = 0;
        db.listas[idActual].items.forEach(it => tUSD += (it.p * it.c));
        document.getElementById('resUSD').innerText = tUSD.toFixed(2);
        document.getElementById('resBS').innerText = (tUSD * db.listas[idActual].tasa).toLocaleString('es-VE');
    }

    function eliminarListaActual() {
        if(confirm('¿Eliminar esta lista permanentemente?')) {
            db.listas.splice(idActual, 1);
            save();
            irAMenuListas();
        }
    }

    function irAMenuListas() {
        document.getElementById('vista-menu-listas').classList.remove('oculto');
        document.getElementById('vista-detalle-lista').classList.add('oculto');
        renderMenuListas();
    }

    actualizarDatalist();
    renderMenuListas();
</script>
</body>
</html>
